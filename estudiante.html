<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estudiante | Portafolio Pro BD II</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* --- NAVEGACIÓN Y SECCIONES (Mantenemos lo anterior) --- */
        .section-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .nav-tab { padding: 15px 30px; font-family: 'Oswald'; cursor: pointer; border-radius: 15px; border: none; transition: 0.3s; }
        .nav-tab.active { background: var(--accent-primary); color: white; box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2); }
        .page-section { display: none; animation: fadeIn 0.5s ease; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ESTILOS DE SEMANAS --- */
        .semana-item { cursor: pointer; padding: 25px; margin-bottom: 15px; transition: 0.3s; }
        .semana-title { font-family: 'Oswald'; font-size: 1.3rem; }
        .file-container { display: none; margin-top: 20px; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .semana-item.active .file-container { display: grid; }
        .file-btn { padding: 15px; text-decoration: none; color: var(--text-main); display: flex; align-items: center; justify-content: space-between; font-weight: 600; cursor: pointer; }

        /* --- VISOR DE PDF (MODAL) --- */
        .pdf-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .pdf-content {
            width: 90%; height: 90%; background: var(--bg-color); border-radius: 20px;
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }
        .pdf-header {
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            background: white; border-bottom: 1px solid #eee;
        }
        .pdf-frame { width: 100%; height: 100%; border: none; }
        .close-pdf { cursor: pointer; font-weight: 800; color: #ff7675; }
        .download-pdf-btn { 
            padding: 8px 15px; background: var(--accent-primary); color: white; 
            border-radius: 10px; text-decoration: none; font-size: 0.8rem; 
        }

        .btn-gh-direct { grid-column: 1 / -1; background: #24292e; color: white !important; text-align: center; justify-content: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="pdfModal" class="pdf-modal">
        <div class="pdf-content neu-card">
            <div class="pdf-header">
                <span id="pdfName" style="font-weight: 600; font-family: 'Oswald';">Visor de Documento</span>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <a id="pdfDownloadLink" href="#" download class="download-pdf-btn">Descargar PDF</a>
                    <span class="close-pdf" onclick="closePDF()">[ CERRAR ]</span>
                </div>
            </div>
            <iframe id="pdfFrame" class="pdf-frame"></iframe>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container" style="max-width: 1100px;">
            <div class="logo-wrapper neu-inset"><img src="LogoUpla.png" class="nav-logo"></div>
            <div class="nav-links">
                <a href="index.html" class="nav-login neu-button-accent">Salir</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content neu-card" style="max-width: 1100px; margin: 0 auto 30px;">
            <span class="badge">Ingeniería de Sistemas</span>
            <h1>PORTAFOLIO DIGITAL <span class="roman">2026</span></h1>
        </div>
    </header>

    <main class="container">
        <div class="section-nav">
            <button class="nav-tab neu-card active" onclick="switchSection('info', this)">INTRODUCCIÓN</button>
            <button class="nav-tab neu-card" onclick="switchSection('portfolio', this)">CONTENIDO ACADÉMICO</button>
        </div>

        <section id="section-info" class="page-section active">
            <div class="profile-card neu-card" style="display: flex; gap: 40px; padding: 40px; align-items: center;">
                <div style="font-size: 4rem; background: #eee; width: 150px; height: 150px; border-radius: 50%; display: flex; justify-content: center; align-items: center;" class="neu-inset">👨‍💻</div>
                <div>
                    <h2 style="font-family: 'Oswald'; color: var(--accent-primary);">Jared Josue Meza Medina</h2>
                    <p>Estudiante de Ingeniería de Sistemas - Ciclo V</p>
                    <p style="color: var(--text-light); margin-top: 10px;">Especialización en gestión de datos y seguridad informática aplicada a entornos SQL Server.</p>
                </div>
            </div>
        </section>

        <section id="section-portfolio" class="page-section">
            <h2 class="section-title">Evidencias de Aprendizaje</h2>
            <div class="grid-unidades" id="studentGrid"></div>
        </section>
    </main>

    <script>
        const REPO_USER = "JaredASD";
        const REPO_NAME = "Base_de_datos_2";

        function switchSection(sectionId, btn) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + sectionId).classList.add('active');
            btn.classList.add('active');
        }

        // Lógica para abrir/cerrar PDF
        function openPDF(url, name) {
    // Usamos el visor de Google para forzar la visualización del PDF de GitHub
    const googleViewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
    
    document.getElementById('pdfFrame').src = googleViewerUrl;
    document.getElementById('pdfName').innerText = name;
    document.getElementById('pdfDownloadLink').href = url;
    document.getElementById('pdfModal').style.display = 'flex';
    document.body.style.overflow = 'hidden'; 
}
function closePDF() {
    const modal = document.getElementById('pdfModal');
    const frame = document.getElementById('pdfFrame');
    
    modal.style.display = 'none';
    frame.src = ''; // Esto detiene la carga del PDF por completo
    document.body.style.overflow = 'auto'; // Devuelve el scroll a la página
}

        const unidades = [
            { nombre: "UNIDAD I: FUNDAMENTOS Y MODELADO", rango: [1,4] },
            { nombre: "UNIDAD II: OPTIMIZACIÓN SQL", rango: [5,8] },
            { nombre: "UNIDAD III: SEGURIDAD Y TRANSACCIONES", rango: [9,12] },
            { nombre: "UNIDAD IV: ARQUITECTURAS MODERNAS", rango: [13,16] }
        ];

        const grid = document.getElementById('studentGrid');
        unidades.forEach(u => {
            let html = `<section class="unidad-card neu-card" style="padding: 30px; margin-bottom: 30px;">
                <div class="card-header" style="font-size: 1.2rem; color: var(--accent-secondary); border-bottom: 2px solid; margin-bottom: 20px; padding-bottom: 10px;">${u.nombre}</div>
                <div class="semanas-lista">`;
            for(let i=u.rango[0]; i<=u.rango[1]; i++){
                let sNum = i < 10 ? '0'+i : i;
                let semanaKey = `Semana${sNum}`;
                html += `
                    <div class="semana-item neu-inset" onclick="toggleSemana(this, '${semanaKey}')">
                        <div class="semana-header"><span class="semana-title">Semana Académica ${sNum}</span></div>
                        <div id="list-${semanaKey}" class="file-container">
                            <span style="font-size:0.7rem; color:#999;">Cargando archivos...</span>
                        </div>
                    </div>`;
            }
            html += `</div></section>`;
            grid.innerHTML += html;
        });

        async function toggleSemana(element, semana) {
            element.classList.toggle('active');
            const container = document.getElementById(`list-${semana}`);
            if (container.getAttribute('data-loaded') === 'true') return;

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO_USER}/${REPO_NAME}/contents/${semana}`);
                const ghBtn = `<a href="https://github.com/${REPO_USER}/${REPO_NAME}/tree/main/${semana}" target="_blank" class="file-btn neu-card btn-gh-direct">Ver carpeta en GitHub</a>`;

                if (!res.ok) {
                    container.innerHTML = `<span style="font-size:0.7rem;">Sin archivos.</span>${ghBtn}`;
                    return;
                }

                const files = await res.json();
                container.innerHTML = "";

                files.forEach(file => {
                    if (file.type === "file") {
                        const isPDF = file.name.toLowerCase().endsWith('.pdf');
                        const item = document.createElement('div');
                        item.className = "file-btn neu-card";
                        
                        // Si es PDF, abre el visor. Si no, descarga directa.
                        item.onclick = (e) => {
                            e.stopPropagation();
                            if (isPDF) {
                                openPDF(file.download_url, file.name);
                            } else {
                                window.open(file.download_url, '_blank');
                            }
                        };

                        item.innerHTML = `<span>📄 ${file.name}</span> <span style="color:var(--accent-primary)">${isPDF ? 'Previsualizar' : 'Descargar'}</span>`;
                        container.appendChild(item);
                    }
                });

                container.insertAdjacentHTML('beforeend', ghBtn);
                container.setAttribute('data-loaded', 'true');
            } catch (err) {
                container.innerHTML = "<span>Error al cargar.</span>";
            }
        }
    </script>
</body>
</html>
