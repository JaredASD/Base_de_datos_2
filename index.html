<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Base de Datos II</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .login-title {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 50px;
            color: var(--text-main);
            letter-spacing: 2px;
        }

        .roles-grid {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .role-card {
            width: 200px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            border: none;
            outline: none;
        }

        .role-card:hover {
            transform: translateY(-10px);
        }

        /* Efecto de presionado al hacer clic */
        .role-card:active {
            box-shadow: var(--shadow-inset-dark), var(--shadow-inset-light);
            transform: translateY(0);
        }

        .role-icon {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 20px;
            /* Filtro opcional por si quieres que los iconos tengan un aire azulado */
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        .role-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .role-admin .role-name { color: var(--accent-primary); }
        .role-student .role-name { color: var(--accent-secondary); }

        @media (max-width: 500px) {
            .roles-grid { gap: 20px; }
            .role-card { width: 160px; padding: 20px; }
            .role-icon { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1 class="login-title">SELECCIONA TU ROL</h1>
        
        <div class="roles-grid">
            <button onclick="selectRole('estudiante')" class="role-card neu-card role-student">
                <img src="estudiante.png" alt="Estudiante" class="role-icon">
                <span class="role-name">ESTUDIANTE</span>
            </button>

            <button onclick="selectRole('admin')" class="role-card neu-card role-admin">
                <img src="administrador.png" alt="Administrador" class="role-icon">
                <span class="role-name">ADMINISTRADOR</span>
            </button>
        </div>
    </div>

    <script>
        function selectRole(role) {
            // Limpiar sesiones previas
            localStorage.clear();
            
            // Guardar el rol seleccionado para que las otras páginas den permiso
            localStorage.setItem('userRole', role);

            // Redirección directa
            if (role === 'admin') {
                window.location.href = "admin.html";
            } else {
                window.location.href = "estudiante.html";
            }
        }
    </script>

</body>
</html>
